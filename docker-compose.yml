version: '3.8'

services:
  # ==========================================================
  # POSTGRESQL (Database utama untuk semua service)
  # Hanya digunakan untuk development lokal.
  # Production menggunakan Supabase.
  # ==========================================================
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
